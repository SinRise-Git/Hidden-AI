<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/public/css/style.css">
</head>
<body>
    <div class="main">
        <div class="info"> 
            <div class="top-text">
               <h1>Hidden AI</h1>
            </div>
            <div>
                <div class="button">
                    <button id="authTokenButton" class="authTokenButton">Access Token</button>
                    <button id="authServiceButton" class="authServiceButton" style="color: gray;">Service Account</button>
                </div>
                <div class="authCheck">
                    <div id="authTokenDiv" class="authToken">
                       <div class="input">
                          <form id="authTokenForm">
                            <p class="infoText">Project Info</p>
                            <input type="text" id="projectIdToken" placeholder="project_id">
                            <input type="text" id="projectRegionToken" placeholder="project_region">
                            <p class="infoText">Authentication Info</p>
                            <input type="text" id="authToken" placeholder="auth_token">
                            <div class="buttonsInput">
                                <button class="authTokenButtonSubmit" id="submitButton">Submit</button>
                            </div>
                          </form>
                            <div class="warningText">
                                <p>Warning! When you get the auth token for your main account using "gcloud print auth-access-token" it will only last for around 10 minuts before it automatically resets the token, so its better to use a service account.</p>
                            </div>
                       </div>
                    </div>
                    <div id="authServiceDiv" class="authService" style="display: none;">
                          <div class="input">
                           <form id="authServiceForm"> 
                            <p class="infoText">Project Info</p>
                            <input type="text" id="projectIdService" placeholder="project_id">
                            <input type="text" id="projectRegionService" placeholder="project_region">
                            <p class="infoText">Authentication Info</p>
                            <input type="text" id="privateKey" placeholder="private_key">
                            <input type="text" id="clientEmail" placeholder="client_email">
                            <input type="text" id="clientId" placeholder="client_id">
                            <div class="buttonsInput">
                                <button class="authServiceButtonSubmit" id="submitButton">Submit</button>
                            </div>
                          </form>
                        </div>
                    </div>
                </div>
                </div>
            </div> 
        </div>
    </div>
</body>
<script src="./scriptBrowser.js"></script>
</html>
